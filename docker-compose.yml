services:
  postgres:
    image: postgres:16-alpine
    container_name: musicgpt-postgres
    environment:
      POSTGRES_USER: musicgpt
      POSTGRES_PASSWORD: password
      POSTGRES_DB: musicgpt
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicgpt -d musicgpt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: musicgpt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: musicgpt-server
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgres://musicgpt:password@postgres:5432/musicgpt
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: musicgpt-worker
    command: ["node", "dist/worker.js"]
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgres://musicgpt:password@postgres:5432/musicgpt
      REDIS_URL: redis://redis:6379
      SKIP_MIGRATIONS: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      server:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: musicgpt-client
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
